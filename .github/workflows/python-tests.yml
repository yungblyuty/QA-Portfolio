name: Python Tests

on:
  push:
  pull_request:

jobs:
  pytest:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"


    - name: Install dependencies
      run: |
        cd Automation/Analytics_Validator
        pip install -r requirements.txt


    - name: Run tests
      run: |
        cd Automation/Analytics_Validator
        pytest